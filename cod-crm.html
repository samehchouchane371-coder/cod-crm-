<style>

<script>
/* =========================================================
   COD CRM — Application logic (vanilla JS, single file)
   ========================================================= */

/* ---------- State ---------- */
const STORAGE_KEY = 'codcrm:v1';
const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
const today = () => new Date().toISOString().slice(0,10);
const fmtNum = (n, d=0) => (isFinite(n)?n:0).toLocaleString('fr-FR', { maximumFractionDigits:d, minimumFractionDigits:d });
const fmtMoney = (n, c='EUR') => {
  if (!isFinite(n)) n = 0;
  try { return n.toLocaleString('fr-FR', { style:'currency', currency:c, maximumFractionDigits:2 }); }
  catch { return fmtNum(n,2) + ' ' + c; }
};
const pct = (n, d=1) => (isFinite(n)?n:0).toLocaleString('fr-FR', { maximumFractionDigits:d, minimumFractionDigits:d }) + '%';

const DEFAULT_STATE = () => ({
  version: 1,
  settings: {
    operatingCurrency: 'EUR',
    rates: { EUR: 1, USD: 0.92 },        // rate => EUR multiplier
    codFeePercent: 5,
    platformFeePercent: 2,
    logisticsFeePerOrder: 0,
    lowStockThreshold: 20,
    roasTarget: 2
  },
  products: [],
  orders: [],
  ads: [],
  countries: []
});

// Storage abstraction with in-memory fallback (Safari private mode safe)
const _memStore = {};
let _storageWarned = false;
const safeStorage = {
  available: (() => { try { const k='__cod_test__'; localStorage.setItem(k,'1'); localStorage.removeItem(k); return true; } catch(e) { return false; } })(),
  get(k) {
    try { return localStorage.getItem(k); } catch(e) { return _memStore[k] ?? null; }
  },
  set(k, v) {
    try { localStorage.setItem(k, v); return true; }
    catch(e) {
      _memStore[k] = v;
      if (!_storageWarned) {
        _storageWarned = true;
        setTimeout(() => toast('Stockage local indisponible (Safari privé ?). Données conservées en mémoire pour cette session.', 'danger'), 100);
      }
      return false;
    }
  }
};

let state = loadState();
function loadState() {
  try {
    const raw = safeStorage.get(STORAGE_KEY);
    if (!raw) return DEFAULT_STATE();
    const s = JSON.parse(raw);
    if (!s.version) return { ...DEFAULT_STATE(), ...s };
    return { ...DEFAULT_STATE(), ...s, settings: { ...DEFAULT_STATE().settings, ...(s.settings||{}) } };
  } catch (e) { return DEFAULT_STATE(); }
}
function saveState() {
  try { safeStorage.set(STORAGE_KEY, JSON.stringify(state)); } catch(e) { console.warn('saveState error', e); }
  try { refreshAlerts(); } catch(e) {}
  try { saveToCloud(); } catch(e) {}
}

/* ---------- Cloud sync (Supabase) ---------- */
const CLOUD_CFG_KEY = 'codcrm:cloudcfg';
let cloud = {
  client: null,
  user: null,
  lastSync: null,
  syncInProgress: false,
  config: { url:'', anonKey:'' }
};

function loadCloudConfig() {
  try { const raw = safeStorage.get(CLOUD_CFG_KEY); if (raw) cloud.config = { ...cloud.config, ...JSON.parse(raw) }; } catch(e){}
}
function saveCloudConfig() {
  try { safeStorage.set(CLOUD_CFG_KEY, JSON.stringify(cloud.config)); } catch(e){}
}

function initCloud() {
  loadCloudConfig();
  if (!cloud.config.url || !cloud.config.anonKey) { updateCloudUI(); return; }
  if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
    console.warn('[CRM] Supabase SDK indisponible'); updateCloudUI(); return;
  }
  try {
    cloud.client = window.supabase.createClient(cloud.config.url, cloud.config.anonKey, {
      auth: { persistSession: true, autoRefreshToken: true }
    });
    cloud.client.auth.getSession().then(({ data }) => {
      cloud.user = data?.session?.user || null;
      updateCloudUI();
      if (cloud.user) loadFromCloud();
    });
    cloud.client.auth.onAuthStateChange((_evt, session) => {
      cloud.user = session?.user || null;
      updateCloudUI();
      if (cloud.user) loadFromCloud();
    });
  } catch(e) { console.error('[CRM] Supabase init failed', e); }
}

async function cloudSignUp(email, password) {
  if (!cloud.client) return { error: 'Cloud non configuré' };
  const { data, error } = await cloud.client.auth.signUp({ email, password });
  if (error) return { error: error.message };
  return { user: data.user };
}
async function cloudSignIn(email, password) {
  if (!cloud.client) return { error: 'Cloud non configuré' };
  const { data, error } = await cloud.client.auth.signInWithPassword({ email, password });
  if (error) return { error: error.message };
  return { user: data.user };
}
async function cloudSignOut() {
  if (!cloud.client) return;
  await cloud.client.auth.signOut();
  cloud.user = null; updateCloudUI();
}
async function loadFromCloud() {
  if (!cloud.client || !cloud.user) return;
  cloud.syncInProgress = true; updateCloudUI();
  try {
    const { data, error } = await cloud.client.from('user_data').select('state, updated_at').eq('user_id', cloud.user.id).maybeSingle();
    if (error && error.code !== 'PGRST116') { console.warn('cloud load', error); toast('Erreur sync: ' + error.message, 'danger'); }
    if (data && data.state) {
      state = { ...DEFAULT_STATE(), ...data.state, settings: { ...DEFAULT_STATE().settings, ...(data.state.settings||{}) } };
      cloud.lastSync = data.updated_at;
      try { safeStorage.set(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
      refreshAlerts();
      render();
      toast('Données chargées du cloud', 'success');
    } else {
      // No cloud data yet → push current local state up
      await pushToCloud(true);
    }
  } catch(e){ console.error('loadFromCloud', e); }
  finally { cloud.syncInProgress = false; updateCloudUI(); }
}

let _cloudPushTimer = null;
function saveToCloud() {
  if (!cloud.client || !cloud.user) return;
  clearTimeout(_cloudPushTimer);
  _cloudPushTimer = setTimeout(() => pushToCloud(false), 1500);
}
async function pushToCloud(silent=false) {
  if (!cloud.client || !cloud.user) return;
  cloud.syncInProgress = true; updateCloudUI();
  try {
    const { error } = await cloud.client.from('user_data').upsert({
      user_id: cloud.user.id,
      state: state,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
    if (error) { console.error('cloud push', error); if (!silent) toast('Erreur sync: ' + error.message, 'danger'); }
    else { cloud.lastSync = new Date().toISOString(); if (!silent) toast('Synchronisé', 'success'); }
  } catch(e){ console.error('pushToCloud', e); }
  finally { cloud.syncInProgress = false; updateCloudUI(); }
}

function updateCloudUI() {
  const el = document.getElementById('cloud-status'); if (!el) return;
  let html = '';
  if (!cloud.config.url || !cloud.config.anonKey) {
    html = '<span class="chip" title="Cloud non configuré · va dans Paramètres" style="cursor:pointer" onclick="navigate(\'/settings\')">☁ Local</span>';
  } else if (!cloud.client) {
    html = '<span class="chip chip-amber">☁ Init…</span>';
  } else if (!cloud.user) {
    html = '<span class="chip chip-amber" style="cursor:pointer" onclick="navigate(\'/settings\')">☁ Non connecté</span>';
  } else if (cloud.syncInProgress) {
    html = '<span class="chip chip-violet">⟳ Sync…</span>';
  } else {
    const ago = cloud.lastSync ? ' · ' + new Date(cloud.lastSync).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
    html = '<span class="chip chip-mint" title="Synchronisé · ' + cloud.user.email + '">☁ Sync' + ago + '</span>';
  }
  el.innerHTML = html;
}

/* ---------- Helpers / Business logic ---------- */
function operatingCurrency() { return state.settings.operatingCurrency || 'EUR'; }
function rate(code) { return state.settings.rates?.[code] ?? 1; }
function toOperating(amount, fromCurrency) {
  if (!fromCurrency || fromCurrency === operatingCurrency()) return amount;
  // value-in-fromCurrency * rate(from) => EUR-equivalent, then divide by rate(operating)
  const eur = amount * (state.settings.rates?.[fromCurrency] ?? 1);
  return eur / (state.settings.rates?.[operatingCurrency()] ?? 1);
}
function unitsPerOrder(p) {
  if (p.offerType === 'standard') return 1;
  if (p.offerType === '1+1') return 2;
  if (p.offerType === '2+1') return 3;
  if (p.offerType === 'custom') return (Number(p.customBuy)||1) + (Number(p.customGet)||0);
  return 1;
}
function realUnitCost(p) {
  // (supplierCost + supplierShipping) converted to operating currency
  const raw = (Number(p.supplierCost)||0) + (Number(p.supplierShipping)||0);
  return toOperating(raw, p.supplierCurrency || operatingCurrency());
}
function consumedTotal(productId) {
  const p = state.products.find(x => x.id === productId); if (!p) return 0;
  const upo = unitsPerOrder(p);
  return state.orders.filter(o => o.productId === productId && o.status === 'delivered')
                     .reduce((s,o)=> s + upo * (Number(o.quantity)||1), 0);
}
function consumedOnDate(productId, dateStr) {
  const p = state.products.find(x => x.id === productId); if (!p) return 0;
  const upo = unitsPerOrder(p);
  return state.orders.filter(o => o.productId === productId && o.status === 'delivered' && o.date === dateStr)
                     .reduce((s,o)=> s + upo * (Number(o.quantity)||1), 0);
}
function currentStock(p) {
  return (Number(p.initialStock)||0) - consumedTotal(p.id);
}
function ordersOf(productId, dateStr) {
  return state.orders.filter(o => o.productId === productId && (!dateStr || o.date === dateStr));
}
function adsOf(productId, dateStr) {
  return state.ads.filter(a => a.productId === productId && (!dateStr || a.date === dateStr));
}
function countryOf(id) { return state.countries.find(c => c.id === id); }
function productOf(id) { return state.products.find(p => p.id === id); }

function profitOnDate(productId, dateStr) {
  const p = productOf(productId); if (!p) return null;
  const upo = unitsPerOrder(p);
  const ruc = realUnitCost(p);
  const cod = (state.settings.codFeePercent||0)/100;
  const plat = (state.settings.platformFeePercent||0)/100;
  const logis = Number(state.settings.logisticsFeePerOrder||0);

  const dayOrders = ordersOf(productId, dateStr);
  const delivered = dayOrders.filter(o => o.status === 'delivered');
  const revenue = delivered.reduce((s,o)=> s + (Number(o.quantity)||1) * (Number(p.sellPrice)||0), 0);
  const productCost = delivered.reduce((s,o)=> s + upo * (Number(o.quantity)||1) * ruc, 0);
  const shippingCost = delivered.reduce((s,o)=> {
    const c = countryOf(o.countryId); return s + (Number(o.quantity)||1) * (Number(c?.localShippingCost)||0);
  }, 0);
  const adSpend = adsOf(productId, dateStr).reduce((s,a)=> s + (Number(a.budget)||0), 0);
  const codFees = revenue * cod;
  const platformFees = revenue * plat;
  const logisticsFees = delivered.reduce((s,o)=> s + (Number(o.quantity)||1) * logis, 0);

  const netProfit = revenue - productCost - shippingCost - adSpend - codFees - platformFees - logisticsFees;
  const margin = revenue > 0 ? (netProfit / revenue) * 100 : 0;
  return { revenue, productCost, shippingCost, adSpend, codFees, platformFees, logisticsFees, netProfit, margin, delivered: delivered.length, totalOrders: dayOrders.length };
}

function minOrdersToBreakEven(p, adBudget, country) {
  if (!p) return Infinity;
  const upo = unitsPerOrder(p);
  const ruc = realUnitCost(p);
  const sp = Number(p.sellPrice)||0;
  const feeRate = ((state.settings.codFeePercent||0) + (state.settings.platformFeePercent||0))/100;
  const ship = Number(country?.localShippingCost) || 0;
  const logis = Number(state.settings.logisticsFeePerOrder||0);
  const contribution = sp * (1 - feeRate) - upo * ruc - ship - logis;
  if (contribution <= 0) return Infinity;
  return Math.ceil((Number(adBudget)||0) / contribution);
}

function roasFor(productId, dateStr) {
  const ad = adsOf(productId, dateStr).reduce((s,a)=> s + (Number(a.budget)||0), 0);
  const p = productOf(productId);
  const delivered = ordersOf(productId, dateStr).filter(o => o.status === 'delivered');
  const revenue = delivered.reduce((s,o)=> s + (Number(o.quantity)||1) * (Number(p?.sellPrice)||0), 0);
  return ad > 0 ? revenue/ad : 0;
}

/* ---------- Période courante (sélecteur Jour/Semaine/Mois/Année) ---------- */
let currentPeriod = { type: 'day', refDate: today() };

function periodRange(p = currentPeriod) {
  const ref = new Date(p.refDate + 'T00:00:00');
  if (p.type === 'day') {
    const d = p.refDate; return { start:d, end:d };
  }
  if (p.type === 'week') {
    const day = ref.getDay() === 0 ? 7 : ref.getDay(); // 1..7 Mon..Sun
    const start = new Date(ref); start.setDate(ref.getDate() - (day - 1));
    const end = new Date(start); end.setDate(start.getDate() + 6);
    return { start: start.toISOString().slice(0,10), end: end.toISOString().slice(0,10) };
  }
  if (p.type === 'month') {
    const start = new Date(ref.getFullYear(), ref.getMonth(), 1);
    const end = new Date(ref.getFullYear(), ref.getMonth() + 1, 0);
    return { start: start.toISOString().slice(0,10), end: end.toISOString().slice(0,10) };
  }
  if (p.type === 'year') {
    return { start: ref.getFullYear()+'-01-01', end: ref.getFullYear()+'-12-31' };
  }
  return { start: p.refDate, end: p.refDate };
}

function periodLabel(p = currentPeriod) {
  const r = periodRange(p);
  const fmt = (d, opts) => new Date(d+'T00:00:00').toLocaleDateString('fr-FR', opts);
  if (p.type === 'day') return fmt(p.refDate, { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
  if (p.type === 'week') return `Semaine ${fmt(r.start, {day:'2-digit',month:'short'})} → ${fmt(r.end, {day:'2-digit',month:'short',year:'numeric'})}`;
  if (p.type === 'month') return fmt(r.start, { month:'long', year:'numeric' });
  if (p.type === 'year') return String(new Date(p.refDate).getFullYear());
  return '';
}

function periodShort(p = currentPeriod) {
  if (p.type === 'day') return 'du jour';
  if (p.type === 'week') return 'de la semaine';
  if (p.type === 'month') return 'du mois';
  if (p.type === 'year') return "de l'année";
  return '';
}

function datesInRange(start, end) {
  const out = []; const d = new Date(start+'T00:00:00'); const e = new Date(end+'T00:00:00');
  while (d <= e) { out.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  return out;
}

function ordersInRange(productId, start, end) {
  return state.orders.filter(o => (!productId || o.productId === productId) && o.date >= start && o.date <= end);
}
function adsInRange(productId, start, end) {
  return state.ads.filter(a => (!productId || a.productId === productId) && a.date >= start && a.date <= end);
}
function consumedInRange(productId, start, end) {
  return datesInRange(start, end).reduce((s,d) => s + consumedOnDate(productId, d), 0);
}
function profitInRange(productId, start, end) {
  return datesInRange(start, end).reduce((acc, d) => {
    const r = profitOnDate(productId, d);
    Object.keys(r).forEach(k => {
      if (k !== 'margin') acc[k] = (acc[k]||0) + (r[k]||0);
    });
    return acc;
  }, { revenue:0, productCost:0, shippingCost:0, adSpend:0, codFees:0, platformFees:0, logisticsFees:0, netProfit:0, delivered:0, totalOrders:0, margin:0 });
}
function roasInRange(productId, start, end) {
  const ad = adsInRange(productId, start, end).reduce((s,a)=> s + (Number(a.budget)||0), 0);
  const p = productOf(productId);
  const delivered = ordersInRange(productId, start, end).filter(o => o.status === 'delivered');
  const revenue = delivered.reduce((s,o)=> s + (Number(o.quantity)||1) * (Number(p?.sellPrice)||0), 0);
  return ad > 0 ? revenue/ad : 0;
}

// Shift current period by +1 / -1 unit and re-render
function shiftPeriod(delta) {
  const d = new Date(currentPeriod.refDate + 'T00:00:00');
  if (currentPeriod.type === 'day') d.setDate(d.getDate() + delta);
  else if (currentPeriod.type === 'week') d.setDate(d.getDate() + 7*delta);
  else if (currentPeriod.type === 'month') d.setMonth(d.getMonth() + delta);
  else if (currentPeriod.type === 'year') d.setFullYear(d.getFullYear() + delta);
  currentPeriod.refDate = d.toISOString().slice(0,10);
  render();
}
function setPeriodType(t) { currentPeriod.type = t; render(); }
function setPeriodDate(d) { currentPeriod.refDate = d || today(); render(); }
function resetPeriodToday() { currentPeriod = { type:'day', refDate: today() }; render(); }

/* ---------- Router ---------- */
const routes = {};
function on(path, handler) { routes[path] = handler; }
function navigate(path) {
  if (location.hash !== '#' + path) location.hash = '#' + path;
  else render();
}
window.addEventListener('hashchange', render);

function matchRoute() {
  const hash = location.hash.replace(/^#/, '') || '/';
  // exact
  if (routes[hash]) return { handler: routes[hash], params: {} };
  // parametric: '/products/:id'
  for (const key of Object.keys(routes)) {
    const parts = key.split('/'), got = hash.split('/');
    if (parts.length !== got.length) continue;
    const params = {}; let ok = true;
    for (let i = 0; i < parts.length; i++) {
      if (parts[i].startsWith(':')) params[parts[i].slice(1)] = decodeURIComponent(got[i]);
      else if (parts[i] !== got[i]) { ok = false; break; }
    }
    if (ok) return { handler: routes[key], params };
  }
  return { handler: routes['/'], params: {} };
}

function render() {
  try { toggleSidebar(false); } catch(e){}
  const { handler, params } = matchRoute();
  // update nav active
  try {
    document.querySelectorAll('[data-route]').forEach(a => {
      const r = a.getAttribute('data-route');
      const h = location.hash.replace(/^#/,'') || '/';
      a.classList.toggle('active', h === r || (r !== '/' && h.startsWith(r)));
      a.onclick = (e) => { e.preventDefault(); navigate(r); };
    });
  } catch(e){ console.error('nav update', e); }
  // today
  try {
    document.getElementById('today-chip').innerHTML = (() => {
      const d = new Date(); return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${d.toLocaleDateString('fr-FR', { weekday:'short', day:'2-digit', month:'short' })}`;
    })();
  } catch(e){}
  const view = document.getElementById('view');
  view.innerHTML = '';
  try {
    handler(params);
  } catch(e) {
    console.error('[CRM] route handler error', e);
    view.innerHTML = '<div class="card" style="padding:24px; margin:16px; border:1px solid #3a2027; background:#1c0f13"><div style="font-weight:700; color:#ff859b; margin-bottom:8px">⚠ Erreur de rendu</div><div style="color:#c7cbd6; font-size:14px; margin-bottom:8px">'+e.message+'</div><pre style="font-size:11px; color:#8f95a6; overflow:auto; white-space:pre-wrap; max-height:200px">'+(e.stack||'')+'</pre><button class="btn btn-primary" style="margin-top:12px" onclick="navigate(\'/\')">Retour dashboard</button></div>';
  }
  try { refreshAlerts(); } catch(e){}
  try { window.scrollTo(0, 0); } catch(e){}
}

/* ---------- Alerts ---------- */
function computeAlerts() {
  const alerts = [];
  const thr = Number(state.settings.lowStockThreshold||0);
  for (const p of state.products) {
    const stock = currentStock(p);
    if (stock <= thr) alerts.push({ level:'warn', msg: `Stock faible: ${p.name} (${stock})`, link:`/products/${p.id}` });
    const r = roasFor(p.id, today());
    if (adsOf(p.id, today()).length > 0 && r > 0 && r < (state.settings.roasTarget||2)) {
      alerts.push({ level:'warn', msg: `ROAS bas: ${p.name} (${r.toFixed(2)})`, link:`/products/${p.id}` });
    }
    const pr = profitOnDate(p.id, today());
    if (adsOf(p.id, today()).length > 0 && pr && pr.netProfit < 0) {
      alerts.push({ level:'danger', msg: `Non rentable aujourd'hui: ${p.name}`, link:`/products/${p.id}` });
    }
  }
  return alerts;
}
function refreshAlerts() {
  const a = computeAlerts();
  const box = document.getElementById('alert-badge');
  const list = document.getElementById('alert-list');
  const count = document.getElementById('alert-count');
  if (a.length === 0) { box.classList.add('hidden'); return; }
  box.classList.remove('hidden');
  count.textContent = `${a.length} alerte${a.length>1?'s':''} active${a.length>1?'s':''}`;
  list.innerHTML = a.slice(0,3).map(x => `<div class="truncate cursor-pointer hover:text-ink-100" onclick="navigate('${x.link}')">• ${x.msg}</div>`).join('');
}

/* Aggregate by period: returns { labels:[], revenue:[], delivered:[], orders:[] } */
function aggregateSales(period, productId) {
  const buckets = []; // { key, label, start, end }
  const now = new Date();
  if (period === 'day') {
    for (let i = 13; i >= 0; i--) { const d = new Date(now); d.setDate(d.getDate()-i); const k = d.toISOString().slice(0,10); buckets.push({ key:k, label:k.slice(5), match:o => o.date === k }); }
  } else if (period === 'week') {
    // last 12 ISO-ish weeks (sunday-based for simplicity)
    for (let i = 11; i >= 0; i--) {
      const end = new Date(now); end.setDate(end.getDate() - i*7);
      const start = new Date(end); start.setDate(start.getDate()-6);
      const s = start.toISOString().slice(0,10), e = end.toISOString().slice(0,10);
      buckets.push({ key:s+'_'+e, label:start.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})+'→'+end.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}), match:o => o.date >= s && o.date <= e });
    }
  } else if (period === 'month') {
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const ym = d.toISOString().slice(0,7);
      buckets.push({ key:ym, label:d.toLocaleDateString('fr-FR',{month:'short',year:'2-digit'}), match:o => o.date.slice(0,7) === ym });
    }
  } else if (period === 'year') {
    for (let i = 4; i >= 0; i--) {
      const y = String(now.getFullYear() - i);
      buckets.push({ key:y, label:y, match:o => o.date.slice(0,4) === y });
    }
  }
  const labels=[], revenue=[], delivered=[], orders=[];
  buckets.forEach(b => {
    let R=0, D=0, T=0;
    state.orders.forEach(o => {
      if (productId && o.productId !== productId) return;
      if (!b.match(o)) return;
      T += 1;
      if (o.status === 'delivered') {
        D += 1;
        const p = productOf(o.productId);
        R += (Number(o.quantity)||1) * (Number(p?.sellPrice)||0);
      }
    });
    labels.push(b.label); revenue.push(R); delivered.push(D); orders.push(T);
  });
  return { labels, revenue, delivered, orders };
}

function drawSalesChart(period, productId) {
  const ctx = document.getElementById('chart-sales'); if (!ctx) return;
  if (window._chSales) window._chSales.destroy();
  const { labels, revenue, delivered, orders } = aggregateSales(period, productId);
  window._chSales = new Chart(ctx, {
    data:{
      labels,
      datasets:[
        { type:'bar', label:`CA livré (${operatingCurrency()})`, data:revenue, backgroundColor:'rgba(124,92,255,0.7)', borderRadius:6, yAxisID:'y' },
        { type:'line', label:'Commandes livrées', data:delivered, borderColor:'#19d4a3', backgroundColor:'rgba(25,212,163,0.10)', tension:.35, fill:false, borderWidth:2, pointRadius:3, yAxisID:'y2' },
        { type:'line', label:'Commandes totales', data:orders, borderColor:'#f5b14a', borderDash:[4,4], tension:.35, fill:false, borderWidth:2, pointRadius:0, yAxisID:'y2' }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#c7cbd6', boxWidth:12, font:{ size:11 } } } },
      scales:{
        x:{ ticks:{ color:'#8f95a6', font:{ size:10 } }, grid:{ color:'#13151b' } },
        y:{ position:'left', ticks:{ color:'#8f95a6', font:{ size:11 } }, grid:{ color:'#13151b' }, title:{ display:false } },
        y2:{ position:'right', ticks:{ color:'#8f95a6', font:{ size:11 } }, grid:{ display:false } }
      }
    }
  });
}

function drawGlobalChart() {
  const ctx = document.getElementById('chart-global'); if (!ctx) return;
  const days = [];
  for (let i = 13; i >= 0; i--) { const x = new Date(); x.setDate(x.getDate()-i); days.push(x.toISOString().slice(0,10)); }
  const rev=[], ads=[], prof=[];
  days.forEach(d => {
    let R=0, A=0, P=0;
    state.products.forEach(p => { const pr = profitOnDate(p.id, d); R+=pr.revenue; A+=pr.adSpend; P+=pr.netProfit; });
    rev.push(R); ads.push(A); prof.push(P);
  });
  new Chart(ctx, {
    type:'line',
    data:{
      labels: days.map(d => d.slice(5)),
      datasets:[
        { label:'CA', data:rev, borderColor:'#7c5cff', backgroundColor:'rgba(124,92,255,0.10)', tension:.35, fill:true, borderWidth:2, pointRadius:0 },
        { label:'Profit net', data:prof, borderColor:'#19d4a3', backgroundColor:'rgba(25,212,163,0.08)', tension:.35, fill:false, borderWidth:2, pointRadius:0 },
        { label:'Budget ads', data:ads, borderColor:'#f5b14a', backgroundColor:'rgba(245,177,74,0.06)', tension:.35, fill:false, borderWidth:2, borderDash:[4,4], pointRadius:0 }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#c7cbd6', boxWidth:12, font:{ size:11 } } } },
      scales:{
        x:{ ticks:{ color:'#8f95a6', font:{ size:11 } }, grid:{ color:'#13151b' } },
        y:{ ticks:{ color:'#8f95a6', font:{ size:11 } }, grid:{ color:'#13151b' } }
      }
    }
  });
}

// Aggregate ads stats per platform over last N days (with proportional revenue attribution)
function platformStats(daysBack=30) {
  const sinceDate = (() => { const d = new Date(); d.setDate(d.getDate() - daysBack + 1); return d.toISOString().slice(0,10); })();
  const ads = state.ads.filter(a => a.date >= sinceDate);
  // Build key (date+pid+cid) -> { totalSpend, revenue, deliveredOrders }
  const groupRevenue = {};
  ads.forEach(a => {
    const key = a.date + '|' + a.productId + '|' + (a.countryId||'');
    if (!groupRevenue[key]) {
      const p = productOf(a.productId);
      const delivered = state.orders.filter(o => o.date === a.date && o.productId === a.productId && (a.countryId ? o.countryId === a.countryId : true) && o.status === 'delivered');
      const totalAd = state.ads.filter(x => x.date === a.date && x.productId === a.productId && (a.countryId ? x.countryId === a.countryId : !x.countryId)).reduce((s,x)=> s + (Number(x.budget)||0), 0);
      const revenue = delivered.reduce((s,o)=> s + (Number(o.quantity)||1) * (Number(p?.sellPrice)||0), 0);
      groupRevenue[key] = { totalAd, revenue, delivered: delivered.length };
    }
  });
  const stats = {};
  ads.forEach(a => {
    const plat = a.platform || 'Autre';
    if (!stats[plat]) stats[plat] = { spend:0, revenue:0, orders:0, delivered:0 };
    const key = a.date + '|' + a.productId + '|' + (a.countryId||'');
    const g = groupRevenue[key];
    const share = g.totalAd > 0 ? (Number(a.budget)||0)/g.totalAd : 0;
    stats[plat].spend += Number(a.budget)||0;
    stats[plat].revenue += g.revenue * share;
    stats[plat].delivered += g.delivered * share;
  });
  return stats;
}

function drawHistory(pid) {
  const days = []; for (let i=29;i>=0;i--){const x=new Date(); x.setDate(x.getDate()-i); days.push(x.toISOString().slice(0,10));}
  const arr = (fn) => days.map(d => state.products.filter(p => !pid || p.id===pid).reduce((s,p)=> s + fn(p, d), 0));
  const rev = arr((p,d)=> profitOnDate(p.id,d).revenue);
  const prof = arr((p,d)=> profitOnDate(p.id,d).netProfit);
  const ads = arr((p,d)=> profitOnDate(p.id,d).adSpend);
  const roas = days.map(d => {
    const a = state.products.filter(p => !pid || p.id===pid).reduce((s,p)=> s + adsOf(p.id,d).reduce((x,a)=> x + (Number(a.budget)||0),0), 0);
    const r = state.products.filter(p => !pid || p.id===pid).reduce((s,p)=> {
      const dl = ordersOf(p.id, d).filter(o => o.status==='delivered');
      return s + dl.reduce((x,o)=> x + (Number(o.quantity)||1) * (Number(p.sellPrice)||0), 0);
    }, 0);
    return a>0 ? r/a : 0;
  });
  const stock = arr((p,d)=> consumedOnDate(p.id, d));
  const ords = days.map(d => state.products.filter(p => !pid || p.id===pid).reduce((s,p)=> s + ordersOf(p.id,d).length, 0));

  // big chart
  const mk = (id, datasets) => {
    const ctx = document.getElementById(id); if (!ctx) return;
    if (window['_ch_'+id]) window['_ch_'+id].destroy();
    window['_ch_'+id] = new Chart(ctx, {
      data: { labels: days.map(d => d.slice(5)), datasets },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ labels:{ color:'#c7cbd6', boxWidth:12, font:{ size:11 } } } },
        scales:{
          x:{ ticks:{ color:'#8f95a6', font:{ size:10 } }, grid:{ color:'#13151b' } },
          y:{ ticks:{ color:'#8f95a6', font:{ size:10 } }, grid:{ color:'#13151b' } }
        }
      }
    });
  };
  mk('hist-chart', [
    { type:'line', label:'CA', data:rev, borderColor:'#7c5cff', backgroundColor:'rgba(124,92,255,0.12)', tension:.35, fill:true, borderWidth:2, pointRadius:0 },
    { type:'line', label:'Profit', data:prof, borderColor:'#19d4a3', tension:.35, borderWidth:2, pointRadius:0 },
    { type:'line', label:'Ads', data:ads, borderColor:'#f5b14a', borderDash:[4,4], tension:.35, borderWidth:2, pointRadius:0 }
  ]);
  mk('h-roas', [{ type:'line', label:'ROAS', data:roas, borderColor:'#f5b14a', tension:.35, borderWidth:2, pointRadius:0, backgroundColor:'rgba(245,177,74,0.10)', fill:true }]);
  mk('h-stock', [{ type:'bar', label:'Unités consommées', data:stock, backgroundColor:'rgba(124,92,255,0.5)', borderRadius:4 }]);
  mk('h-orders', [{ type:'bar', label:'Commandes', data:ords, backgroundColor:'rgba(25,212,163,0.6)', borderRadius:4 }]);

  // table
  document.getElementById('hist-tbody').innerHTML = days.slice().reverse().map((d, idx) => {
    const i = days.length - 1 - idx;
    return `<tr>
      <td>${d.slice(5)}</td>
      <td>${fmtMoney(rev[i], operatingCurrency())}</td>
      <td class="${prof[i]>=0?'stat-up':'stat-down'} font-semibold">${fmtMoney(prof[i], operatingCurrency())}</td>
      <td>${ords[i]}</td>
    </tr>`;
  }).join('');
}

function setProfitFilter(v) { _profitProductFilter = v; render(); }

on('/profit', () => {
  setTitle('CA & Bénéfice', periodLabel());

  const ps = periodShort();
  const dates = datesInRange(range.start, range.end);
  const filterId = _profitProductFilter;
  const products = filterId ? state.products.filter(p => p.id === filterId) : state.products;

  // Compute per-date row stats (summed across selected products)
  const rows = dates.map(d => {
    const stats = products.reduce((acc, p) => {
      const pr = profitOnDate(p.id, d);
      const upo = unitsPerOrder(p);
      const deliveredOrders = state.orders.filter(o => o.productId === p.id && o.date === d && o.status === 'delivered');
      const ventes = deliveredOrders.reduce((s,o) => s + (Number(o.quantity)||1), 0);
      acc.ventes += ventes;
      acc.ordersCount += deliveredOrders.length;
      acc.ca += pr.revenue;
      acc.pub += pr.adSpend;
      acc.coutProduit += pr.productCost; // = unités livrées × (coût fournisseur + livraison fournisseur)
      acc.fraisAnnexes += pr.codFees + pr.platformFees + pr.shippingCost + pr.logisticsFees;
      acc.benefice += pr.netProfit;
      return acc;
    }, { ventes:0, ordersCount:0, ca:0, pub:0, coutProduit:0, fraisAnnexes:0, benefice:0 });
    return { date: d, ...stats };
  }).filter(r => r.ventes > 0 || r.ca > 0 || r.pub > 0 || r.coutProduit > 0);

  const totals = rows.reduce((acc, r) => ({
    ventes: acc.ventes + r.ventes,
    ordersCount: acc.ordersCount + r.ordersCount,
    ca: acc.ca + r.ca,
    pub: acc.pub + r.pub,
    coutProduit: acc.coutProduit + r.coutProduit,
    fraisAnnexes: acc.fraisAnnexes + r.fraisAnnexes,
    benefice: acc.benefice + r.benefice
  }), { ventes:0, ordersCount:0, ca:0, pub:0, coutProduit:0, fraisAnnexes:0, benefice:0 });

  const marge = totals.ca > 0 ? (totals.benefice / totals.ca) * 100 : 0;

      ${kpi({ label:'Budget pub', value: fmtMoney(totals.pub, operatingCurrency()), sub:`ROAS ${(totals.pub>0?totals.ca/totals.pub:0).toFixed(2)}`, tone:'amber' })}
      ${kpi({ label:'Coût produit (livraison incl.)', value: fmtMoney(totals.coutProduit, operatingCurrency()), sub:`+ frais ${fmtMoney(totals.fraisAnnexes, operatingCurrency())}` })}
      ${kpi({ label:'Bénéfice net ' + ps, value: fmtMoney(totals.benefice, operatingCurrency()), sub:`marge ${pct(marge)}`, tone: totals.benefice>=0?'mint':'rose' })}
    </div>

    <div class="card mb-3" style="padding:12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
      <span class="label" style="margin-bottom:0">Filtre produit</span>
      <select class="select" style="max-width:280px" onchange="setProfitFilter(this.value)">
        <option value="">Tous les produits</option>
        ${state.products.map(p => `<option value="${p.id}" ${filterId===p.id?'selected':''}>${p.name}</option>`).join('')}
      </select>
      <button class="btn btn-ghost" style="margin-left:auto" onclick="exportProfitCSV()">↓ Export CSV</button>
    </div>

    <div class="card" style="overflow:hidden">
      <div style="overflow-x:auto">

          <tbody>
            ${rows.length === 0 ? `<tr><td colspan="7" style="text-align:center; padding:32px; color:#8f95a6">Aucune activité sur cette période</td></tr>` :
              rows.slice().reverse().map(r => `

      Bénéfice net = CA − coût produit − budget pub − frais annexes. Tout est recalculé en temps réel à partir des commandes, ads et paramètres.
    </div>
  `;
});

// CSV export of the profit table
function exportProfitCSV() {
  const range = periodRange();
  const dates = datesInRange(range.start, range.end);
  const filterId = _profitProductFilter;
  const products = filterId ? state.products.filter(p => p.id === filterId) : state.products;
  const rows = [['date','ventes (unités)','CA','budget pub','coût produit (liv. fournisseur incl.)','frais annexes','bénéfice net']];
  dates.forEach(d => {
    const stats = products.reduce((acc, p) => {
      const pr = profitOnDate(p.id, d);
      const deliveredOrders = state.orders.filter(o => o.productId === p.id && o.date === d && o.status === 'delivered');
      const ventes = deliveredOrders.reduce((s,o) => s + (Number(o.quantity)||1), 0);
      acc.ventes += ventes;
      acc.ca += pr.revenue;
      acc.pub += pr.adSpend;
      acc.coutProduit += pr.productCost;
      acc.fraisAnnexes += pr.codFees + pr.platformFees + pr.shippingCost + pr.logisticsFees;
      acc.benefice += pr.netProfit;
      return acc;
    }, { ventes:0, ca:0, pub:0, coutProduit:0, fraisAnnexes:0, benefice:0 });
    if (stats.ventes > 0 || stats.ca > 0 || stats.pub > 0 || stats.coutProduit > 0) {
      rows.push([d, stats.ventes, stats.ca.toFixed(2), stats.pub.toFixed(2), stats.coutProduit.toFixed(2), stats.fraisAnnexes.toFixed(2), stats.benefice.toFixed(2)]);
    }
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type:'text/csv;charset=utf-8;' });
  const label = filterId ? (productOf(filterId)?.name||'produit') : 'tous';
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `cod-crm-ca-benefice-${label}-${range.start}-${range.end}.csv`; a.click();
  toast('Export CSV téléchargé', 'success');
}

// Resize image to max 480px and return base64 dataURL
function resizeImage(file, maxSize=480) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(1, maxSize / Math.max(img.width, img.height));
        const w = Math.round(img.width * ratio), h = Math.round(img.height * ratio);
        const c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = reject; img.src = reader.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

      <input class="input" data-cf-val="${i}" placeholder="Valeur" value="${(cf.value||'').replace(/"/g,'&quot;')}">
      <button type="button" class="btn btn-danger py-2 px-3" data-cf-remove="${i}">✕</button>
    </div>`).join('');
  host.querySelectorAll('[data-cf-key]').forEach(el => el.oninput = e => { _prodDraft.customFields[+el.dataset.cfKey].key = e.target.value; });
  host.querySelectorAll('[data-cf-val]').forEach(el => el.oninput = e => { _prodDraft.customFields[+el.dataset.cfVal].value = e.target.value; });
  host.querySelectorAll('[data-cf-remove]').forEach(el => el.onclick = () => { _prodDraft.customFields.splice(+el.dataset.cfRemove, 1); renderCustomFieldRows(); });
}

    }
    saveState(); closeModal(); toast('Pays enregistré', 'success'); render();
  };
}
function deleteCountry(id) {
  if (!confirm('Supprimer ce pays ? Les commandes / pubs associées ne seront pas supprimées.')) return;
  state.countries = state.countries.filter(c => c.id !== id);
  saveState(); toast('Pays supprimé', 'success'); render();
}

/* ---------- Export / Import / Reset ---------- */
function exportCSV() {
  const rows = [['date','produit','sku','pays','quantité','prix','statut','offre','unitsParLivraison']];
  state.orders.forEach(o => {
    const p = productOf(o.productId); const c = countryOf(o.countryId);
    rows.push([o.date, p?.name||'', p?.sku||'', c?.name||'', o.quantity||1, p?.sellPrice||0, o.status, p?.offerType||'', p?unitsPerOrder(p):1]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `cod-crm-commandes-${today()}.csv`; a.click();
}
function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `cod-crm-backup-${today()}.json`; a.click();
}
function importJSON(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const fr = new FileReader();
  fr.onload = () => {
    try {
      const data = JSON.parse(fr.result);
      if (!data || typeof data !== 'object') throw new Error('Invalid');
      if (!confirm('Remplacer toutes les données par celles du fichier ?')) return;
      state = { ...DEFAULT_STATE(), ...data, settings: { ...DEFAULT_STATE().settings, ...(data.settings||{}) } };
      saveState(); toast('Import réussi', 'success'); render();
    } catch (e) { toast('Fichier invalide', 'danger'); }
  };
  fr.readAsText(file);
}
function resetAll() {
  if (!confirm('Réinitialiser toutes les données ? Cette action est irréversible.')) return;
  state = DEFAULT_STATE(); saveState(); toast('Données réinitialisées', 'success'); navigate('/');
}

/* ---------- Safari / robustness safety nets ---------- */
// Prevent ANY form submission from reloading the page (Safari is strict about this)
document.addEventListener('submit', function(e){ e.preventDefault(); return false; }, true);
// Stub Chart.js if it failed to load (CDN blocked, offline, etc.)
if (typeof Chart === 'undefined') {
  console.warn('[CRM] Chart.js indisponible — graphiques désactivés');
  window.Chart = function() { this.destroy = function(){}; return this; };
}

/* ---------- Boot ---------- */
try { render(); }
catch(e) {
  console.error('[CRM] render error', e);
  document.getElementById('view').innerHTML = '<div class="card p-6 text-rose-500">Erreur de rendu : '+e.message+'</div>';
}
try { initCloud(); } catch(e) { console.warn('initCloud', e); }
